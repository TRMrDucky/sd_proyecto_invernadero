<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Invernadero ITSON | Consultar sensores</title>
    <head>
      <meta charset="utf-8">
      <title>Invernadero ITSON | Inicio</title>
      <link rel="stylesheet" href="styles.css">
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,700,1,0" />
      <style>
        .material-symbols-outlined {
          font-size: 100px;
        }
      </style>
      </head>
  </head>

  <body>

    <div class="main-header">
      <h1 class="title">Tus sensores...</h1>
    </div>

    <div class="sensor-cataloge"id="sensor-cataloge">

      <div class="sensor-card">
          <span class="material-symbols-outlined icon">
            memory
          </span>

          <h3 id="sensor-name">Sensor placeholder</h3>
        <p id="last-update">Ultima lectura: 14-05-2026</p>

        <div class="data">

          <div class="data-row">
            <span class="data-label">Humedad</span>
            <span class="data-value">00.00%</span>
          </div>

          <div class="data-row">
            <span class="data-label">Temperatura</span>
            <span class="data-value">00.00°C</span>
          </div>

        </div>

        <div class="sensor-action-buttons">
            <button class="update-btn">
              Actualizar
            </button>

            <button class="delete-btn">
              Eliminar
            </button>
        </div>
      </div>
    </div>

  </body>
</html>
