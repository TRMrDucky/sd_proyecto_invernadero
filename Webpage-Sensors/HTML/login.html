<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Autenticación - ITSON Invernadero</title>
    <!-- Tailwind CSS para diseño rápido -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <!-- Encabezado institucional -->
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-blue-700 tracking-wide">ITSON</h1>
            <p class="text-sm text-gray-500 font-semibold">Sistemas Distribuidos - Invernadero</p>
        </div>

        <h2 class="text-xl font-semibold text-gray-800 mb-4 text-center">Iniciar Sesión</h2>
        
        <!-- Formulario -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@itson.edu.mx"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••"
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-sm">
            </div>
            <button type="submit" 
                class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                Autenticar y Obtener Token
            </button>
        </form>

        <!-- Consola de Resultados Visual -->
        <div class="mt-6">
            <h3 class="text-sm font-medium text-gray-700 mb-2">Estado del Servidor / Respuesta:</h3>
            <div id="responseConsole" class="p-3 bg-gray-900 text-green-400 font-mono text-xs rounded-md h-40 overflow-y-auto whitespace-pre-wrap">
Esperando peticiones...
            </div>
        </div>
    </div>

    <!-- VINCULACIÓN DEL ARCHIVO JAVASCRIPT EXTERNO -->
    <script src="../JS/auth.js"></script>
</body>
</html>
